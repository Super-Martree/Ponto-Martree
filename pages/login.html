<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Martree</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="login-page">
  <div class="login-shell">
    <section class="login-card">
      <div class="login-brand-wrap">
        <div class="brand-logo-slot"><img src="../assets/logomartree.png" alt="Logo Martree" /></div>
        <div class="brand-meta">
          <div class="company-tag">Martree</div>
          <div class="brand">Acesso</div>
        </div>
      </div>

      <div class="login-heading">
        <h1>Entrar no sistema</h1>
        <p class="page-subtitle">Use seu e-mail corporativo e sua senha para acessar o painel.</p>
      </div>

      <form id="loginForm" class="login-form">
        <div>
          <label for="email">E-mail</label>
          <input id="email" type="email" autocomplete="email" required />
        </div>

        <div>
          <label for="senha">Senha</label>
          <input id="senha" type="password" autocomplete="current-password" required />
        </div>

        <button type="submit">Entrar</button>
      </form>

      <div id="msg"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { login, getUser } from '../js/auth.js';
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');

    (async () => {
      const user = await getUser();
      if (user) window.location.href = './dashboard.html';
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.innerHTML = '';

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      try {
        await login(email, senha);
        window.location.href = './dashboard.html';
      } catch (error) {
        const friendly = error?.status === 400
          ? 'E-mail ou senha invalidos.'
          : error.message;
        msg.innerHTML = `<div class="msg error">${friendly}</div>`;
      }
    });
  </script>
</body>
</html>
